kind: Container
name: compiler
image: ghcr.io/ant-pm/antcc-executor:latest
replicas: {{ replicas }}
env:
    - COLONY_HOST={{ colonies_server }}
    - COLONY={{ colony_name }}
    - COLONY_PRIVATE_KEY={{ executor_prvkey }}
    - MINIO_ENDPOINT={{ minio_endpoint }}
    - MINIO_ACCESS_KEY={{ minio_access_key }}
    - MINIO_SECRET_KEY={{ minio_secret_key }}
    - MINIO_BUCKET={{ minio_bucket }}
